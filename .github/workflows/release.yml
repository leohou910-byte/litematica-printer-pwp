  # 验证输入的 release tag 是否有效
  validate_release:
    runs-on: ubuntu-latest
    needs: changelog
    steps:
      - name: 获取 GitHub Release 信息
        uses: cardinalby/git-get-release-action@1.2.5
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag: ${{ github.event.inputs.target_release_tag }}

  build:
    uses: ./.github/workflows/_step.release_build.yml
    needs:
      - validate_release
    with:
      release: true