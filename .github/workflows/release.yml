name: 发布

# release: <默认> (release 标题)
# dispatch (全部): 手动发布 $target_release_tag
# dispatch (指定): 手动发布 $target_release_tag (子项目: $target_subproject)
run-name: |-
  ${{ github.event_name == 'workflow_dispatch' && format('手动发布 {0}', github.event.inputs.target_release_tag) || '发布' }}

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      target_subproject:
        description: |-
          要发布的 Minecraft 版本子项目名称，多个用 "," 分隔。
          留空则发布所有子项目
        type: string
        required: false
        default: ''
      target_release_tag:
        description: 要附加构建产物的 Git tag 标签
        type: string
        required: true

env:
  IS_THIS_RELEASE: true

jobs:
  show_action_parameters:
    runs-on: ubuntu-latest
    steps:
      - name: 显示操作参数
        run: |
          cat <<EOF > $GITHUB_STEP_SUMMARY
          ## 操作参数
          - target_release_tag: \
          \
          EOF

